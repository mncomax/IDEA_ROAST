use_default_settings: true

server:
  secret_key: "change-me-in-production"
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false

search:
  safe_search: 0
  default_lang: "de"
  formats:
    - html
    - json

engines:
  - name: google
    engine: google
    shortcut: g
    disabled: false
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false
  - name: bing
    engine: bing
    shortcut: bi
    disabled: false
  - name: google news
    engine: google_news
    shortcut: gn
    disabled: false
  - name: google scholar
    engine: google_scholar
    shortcut: gs
    disabled: false
  - name: reddit
    engine: reddit
    shortcut: re
    disabled: false

outgoing:
  request_timeout: 10
  max_request_timeout: 15
